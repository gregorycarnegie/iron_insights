[package]
name = "iron_insights_app"
version = "0.1.0"
edition = "2024"

[dependencies]

[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-net = "0.6.0"
gloo-timers = "0.3.0"
leptos = { version = "0.8.17", features = ["csr"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
wasm-bindgen = "0.2.114"
wasm-bindgen-futures = "0.4.64"
web-sys = { version = "0.3.91", features = [
  "Clipboard",
  "CanvasRenderingContext2d",
  "Document",
  "Element",
  "History",
  "HtmlAnchorElement",
  "HtmlCanvasElement",
  "HtmlElement",
  "HtmlInputElement",
  "Location",
  "Navigator",
  "Storage",
  "UrlSearchParams",
  "Window"
] }
