    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "name": "Iron Insights",
            "description": "Powerlifting percentile calculator and lift comparison explorer.",
            "url": "https://gregorycarnegie.github.io/iron_insights/",
            "inLanguage": "en"
          },
          {
            "@type": "WebApplication",
            "name": "Iron Insights",
            "applicationCategory": "SportsApplication",
            "operatingSystem": "Web",
            "url": "https://gregorycarnegie.github.io/iron_insights/",
            "description": "Enter your lifts to see how you rank among lifters by percentile, tier, and comparison mode."
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What does percentile mean?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Percentile shows the share of comparable lifters you outperform. Higher percentile means stronger relative ranking."
                }
              },
              {
                "@type": "Question",
                "name": "Where does the data come from?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Data is loaded from the bundled competition dataset version shown in the app."
                }
              },
              {
                "@type": "Question",
                "name": "Why does equipment matter?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Different equipment changes performance, so equipment filters create fairer comparisons."
                }
              }
            ]
          }
        ]
      }
    </script>
