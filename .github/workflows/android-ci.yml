name: Android CI

on:
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
      - '.github/workflows/android-release.yml'
  push:
    branches:
      - master
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure Gradle wrapper is executable
        shell: bash
        run: chmod +x android/gradlew

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          # sdkmanager exits as soon as it has accepted all licenses, which can leave
          # `yes` with SIGPIPE; tolerate that expected broken-pipe case.
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Create temporary release keystore
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -alias ironinsights \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -keystore "${RUNNER_TEMP}/android-ci-release.keystore" \
            -storepass changeit \
            -keypass changeit \
            -dname "CN=Iron Insights, OU=Android, O=Iron Insights, L=London, ST=London, C=GB"

      - name: Validate release config
        shell: bash
        run: |
          set -euo pipefail
          ./android/gradlew -p android validateReleaseConfig --max-workers=1 \
            -PironInsightsRequireReleaseSigning=true \
            -PironInsightsVersionName=0.1.0-ci \
            -PironInsightsVersionCode=101 \
            -PironInsightsKeystorePath="${RUNNER_TEMP}/android-ci-release.keystore" \
            -PironInsightsKeystorePassword=changeit \
            -PironInsightsKeyAlias=ironinsights \
            -PironInsightsKeyPassword=changeit

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          ./android/gradlew -p android :app:assembleDebug --max-workers=1

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          ./android/gradlew -p android testDebugUnitTest --max-workers=1
