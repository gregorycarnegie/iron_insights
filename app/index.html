<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IRONSCALE // Where You Stand</title>
    <meta name="description" content="IRONSCALE places your powerlifting numbers against 2M+ federated lifters. Percentiles, distributions, and strength analytics." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0b0b0d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@300;400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,500&display=swap" rel="stylesheet" />
    <link data-trunk rel="css" href="assets/style.css" />
    <link data-trunk rel="copy-dir" href="assets" />
    <link data-trunk rel="copy-file" href="data/latest.json" />
    <link data-trunk rel="copy-dir" href="data" />
  </head>
  <body>
    <div id="app-shell" class="app boot-shell" aria-busy="true">
      <aside class="nav">
        <div class="brand">
          <div class="brand-mark"><span class="bar"></span>IRONSCALE</div>
          <div class="brand-sub">// WHERE YOU STAND</div>
        </div>
      </aside>
      <main class="main">
        <div class="topbar">
          <div class="crumb"><span>SYSTEM</span><span class="sep">/</span><span class="cur">LOADING</span></div>
        </div>
        <section class="page active">
          <div class="page-head">
            <div>
              <div class="skeleton skeleton-title"></div>
              <div class="skeleton skeleton-title short"></div>
            </div>
            <div class="boot-lede">
              <div class="skeleton skeleton-line"></div>
              <div class="skeleton skeleton-line wide"></div>
              <div class="skeleton skeleton-line narrow"></div>
            </div>
          </div>
          <div class="rank-grid">
            <div class="panel">
              <div class="panel-head">
                <span><span class="tag">01</span> YOUR NUMBERS</span>
                <span>INPUT</span>
              </div>
              <div class="panel-body input-stack">
                <div class="skeleton skeleton-control"></div>
                <div class="skeleton skeleton-control"></div>
                <div class="skeleton skeleton-control"></div>
                <div class="skeleton skeleton-button"></div>
              </div>
            </div>
            <div>
              <div class="rank-stats">
                <div class="mini-stat"><div class="skeleton skeleton-stat"></div></div>
                <div class="mini-stat"><div class="skeleton skeleton-stat"></div></div>
                <div class="mini-stat"><div class="skeleton skeleton-stat"></div></div>
                <div class="mini-stat"><div class="skeleton skeleton-stat"></div></div>
              </div>
              <div class="panel panel-mb">
                <div class="panel-head">
                  <span><span class="tag">02</span> DISTRIBUTION CURVE</span>
                  <span>LOADING</span>
                </div>
                <div class="panel-body">
                  <div class="skeleton skeleton-chart"></div>
                </div>
              </div>
              <div class="panel">
                <div class="panel-head">
                  <span><span class="tag">03</span> PERCENTILE CLIMB</span>
                  <span>LOADING</span>
                </div>
                <div class="panel-body">
                  <div class="skeleton skeleton-ladder"></div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div id="app"></div>
  </body>
</html>
