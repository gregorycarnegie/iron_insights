name: Website Data And Deploy

on:
  push:
    branches:
      - master
    paths:
      - '.cargo/**'
      - '.github/workflows/refresh-data-and-deploy.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'app/**'
      - 'data/**'
      - 'pipeline/**'
      - 'scripts/**'
      - 'src/**'
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

env:
  # Exercise all JS actions on Node 24 now to catch breakage before runner defaults switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh-and-deploy:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Quality gates (tests + clippy)
        shell: bash
        run: |
          set -euo pipefail
          cargo test --workspace
          cargo test --manifest-path pipeline/Cargo.toml
          cargo test --manifest-path app/Cargo.toml
          cargo clippy --workspace --all-targets -- -D warnings
          cargo clippy --manifest-path pipeline/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path app/Cargo.toml --all-targets -- -D warnings

      - name: Capture previous latest version
        id: previous
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f data/latest.json ]]; then
            PREV_VERSION=$(jq -r '.version // empty' data/latest.json)
            echo "previous_version=${PREV_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "previous_version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run data pipeline
        shell: bash
        run: |
          set -euo pipefail
          DATE_UTC=$(date -u +%Y-%m-%d)
          VERSION="v${DATE_UTC}"

          echo "DATA_VERSION=${VERSION}" >> "$GITHUB_ENV"

          cargo run --manifest-path pipeline/Cargo.toml --bin 01_download -- \
            --dataset-version "${VERSION}"

          cargo run --manifest-path pipeline/Cargo.toml --bin 02_build_aggregates

          cargo run --manifest-path pipeline/Cargo.toml --bin 03_publish_data -- \
            --data-dir data \
            --version "${VERSION}" \
            --keep-versions 2

      - name: Safeguards and metadata report
        shell: bash
        run: |
          set -euo pipefail

          # Guard: essential files must exist.
          test -s "pipeline/output/openpowerlifting-latest.parquet"
          test -s "pipeline/output/build_metadata.json"
          test -s "data/latest.json"
          test -s "data/${DATA_VERSION}/index.json"

          sum_totals() {
            awk '{s += $1} END {print s + 0}'
          }

          aggregate_total_for_version() {
            local version="$1"
            local version_dir="data/${version}"
            local index_json="${version_dir}/index.json"

            [[ -s "${index_json}" ]] || {
              echo "0"
              return
            }

            if [[ -d "${version_dir}/meta" ]]; then
              find "${version_dir}/meta" -type f -name '*.json' -print0 \
                | xargs -0 -r jq -r '.hist.total // 0' \
                | sum_totals
              return
            fi

            local mode
            mode="$(jq -r 'if has("slices") then "flat" elif has("shards") then "sharded" else "unknown" end' "${index_json}")"

            if [[ "${mode}" == "flat" ]]; then
              jq -r '.slices | if type=="object" then to_entries[].value.summary.total // 0 else empty end' "${index_json}" \
                | sum_totals
              return
            fi

            if [[ "${mode}" == "sharded" ]]; then
              jq -r '.shards | to_entries[].value' "${index_json}" \
                | while IFS= read -r shard_rel; do
                    [[ -n "${shard_rel}" ]] || continue
                    shard_path="${version_dir}/${shard_rel}"
                    [[ -s "${shard_path}" ]] || continue
                    jq -r '.slices | if type=="object" then to_entries[].value.summary.total // 0 else empty end' "${shard_path}"
                  done \
                | sum_totals
              return
            fi

            echo "0"
          }

          # Aggregate row-count proxy (sum of histogram totals across slices).
          # Prefer meta files when present, otherwise read compact summary totals from index/shards.
          NEW_TOTAL="$(aggregate_total_for_version "${DATA_VERSION}")"

          if [[ -z "${NEW_TOTAL}" || "${NEW_TOTAL}" == "0" ]]; then
            echo "Computed NEW_TOTAL is empty/zero; failing."
            exit 1
          fi

          PREV_VERSION='${{ steps.previous.outputs.previous_version }}'
          PREV_TOTAL=0
          if [[ -n "${PREV_VERSION}" && -d "data/${PREV_VERSION}" ]]; then
            PREV_TOTAL="$(aggregate_total_for_version "${PREV_VERSION}")"
          fi

          if [[ "${PREV_TOTAL}" != "0" ]]; then
            if (( NEW_TOTAL * 2 < PREV_TOTAL )); then
              echo "New total (${NEW_TOTAL}) dropped below 50% of previous (${PREV_TOTAL})."
              exit 1
            fi
            echo "Previous total: ${PREV_TOTAL}"
            echo "New total: ${NEW_TOTAL}"
          else
            echo "No previous total baseline available; skipping drop-threshold check."
            echo "New total: ${NEW_TOTAL}"
          fi

          echo "Build metadata:"
          cat pipeline/output/build_metadata.json

      - name: Commit refreshed data back to main
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data
          git commit -m "chore(data): weekly refresh ${DATA_VERSION}"
          git push

      - name: Sync app data for trunk copy step
        shell: bash
        run: |
          set -euo pipefail
          rm -rf app/data
          mkdir -p app/data
          cp -a data/. app/data/

      - name: Build static site to docs
        shell: bash
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          cd app
          trunk build --release --dist ../docs --public-url "/${REPO_NAME}/"

      - name: QA report (data + payload)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/qa.sh
          ./scripts/qa.sh data docs

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
